<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockify</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app">
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.5"/>
          <line x1="14" y1="6" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="14" x2="19" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="1.5" fill="currentColor"/>
        </svg>
        clockify
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="stopwatch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 3h6"/><path d="M19.5 7l-1.5-1.5"/></svg>
        stopwatch
      </button>
      <button class="tab" data-tab="timer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        timer
      </button>
      <button class="tab" data-tab="alarm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><path d="M4 2 2 4"/><path d="m20 2 2 2"/></svg>
        alarm
      </button>
    </nav>

    <!-- STOPWATCH -->
    <section class="section active" id="stopwatch">
      <div class="display">
        <div class="time-display" id="sw-display">00:00<span class="ms">.00</span></div>
        <div class="status" id="sw-status">ready</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="sw-lap" onclick="swLap()" title="lap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        </button>
        <button class="ctrl-btn main" id="sw-main" onclick="swStartStop()" title="start">
          <svg id="sw-main-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="sw-reset" onclick="swReset()" title="reset">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
      <div class="laps" id="sw-laps"></div>
    </section>

    <!-- TIMER -->
    <section class="section" id="timer">
      <div class="time-inputs" id="tm-inputs">
        <div class="input-group">
          <input type="number" id="tm-h" min="0" max="99" value="0" placeholder="00">
          <label>h</label>
        </div>
        <span class="colon">:</span>
        <div class="input-group">
          <input type="number" id="tm-m" min="0" max="59" value="5" placeholder="00">
          <label>m</label>
        </div>
        <span class="colon">:</span>
        <div class="input-group">
          <input type="number" id="tm-s" min="0" max="59" value="0" placeholder="00">
          <label>s</label>
        </div>
      </div>
      <div class="display">
        <div class="time-display" id="tm-display">05:00</div>
        <div class="status" id="tm-status">ready</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn main" id="tm-main" onclick="tmStartStop()" title="start">
          <svg id="tm-main-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="tmReset()" title="reset">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
      <div class="ring-banner" id="tm-banner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        timer done!
        <button class="stop-btn" onclick="tmStopRing()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          stop
        </button>
      </div>
    </section>

    <!-- ALARM -->
    <section class="section" id="alarm">
      <div class="ring-banner" id="al-banner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span id="al-banner-text">alarm!</span>
        <button class="stop-btn" onclick="alStopRing()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          stop
        </button>
      </div>
      <div class="alarm-add">
        <input type="time" id="al-time" value="07:00">
        <input type="text" id="al-label" placeholder="label (optional)" maxlength="30">
        <button class="add-btn" onclick="alAdd()" title="add alarm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="alarm-list" id="al-list"></div>
      <p class="notif-hint" id="notif-hint"></p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
